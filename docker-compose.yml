version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: otakurecs-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PINECONE_API_KEY=${PINECONE_API_KEY}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: otakurecs-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:                                # <-- NEW: This passes your Supabase keys into the container!
      - ./frontend/.env.local                
    environment:
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev
    depends_on:
      - backend